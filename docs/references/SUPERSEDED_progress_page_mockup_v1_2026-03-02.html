<style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const C = {
  bg:"#0d1321", card:"#141c2e", cardDeep:"#111828", hover:"#1a2540",
  border:"rgba(255,255,255,0.07)", borderMed:"rgba(255,255,255,0.12)",
  orange:"#c2650a", orangeL:"#e07b20", orangeFaint:"rgba(194,101,10,0.12)", orangeBorder:"rgba(194,101,10,0.28)",
  blue:"#4a90d9", blueFaint:"rgba(74,144,217,0.1)", blueL:"#6aaaf0",
  atl:"#e07830",
  tsb:"#2ab87a", tsbFaint:"rgba(42,184,122,0.1)", tsbBorder:"rgba(42,184,122,0.22)",
  red:"#e05050", redFaint:"rgba(224,80,80,0.1)",
  w:"#ffffff", t70:"rgba(255,255,255,0.7)", t50:"rgba(255,255,255,0.5)",
  t35:"rgba(255,255,255,0.35)", t20:"rgba(255,255,255,0.2)", t10:"rgba(255,255,255,0.1)", t06:"rgba(255,255,255,0.06)",
};

function useInView(ref, threshold=0.12) {
  const [seen,setSeen]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setSeen(true);o.disconnect();}},{threshold});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return seen;
}

const Label=({children,color})=><p style={{color:color||C.t35,fontSize:10,textTransform:"uppercase",letterSpacing:"0.16em",fontWeight:600,margin:"0 0 7px"}}>{children}</p>;

function Card({children,style={},delay=0}){
  const ref=useRef(null);const inView=useInView(ref);
  return(
    <div ref={ref} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px 28px",
      opacity:inView?1:0,transform:inView?"none":"translateY(22px)",
      transition:`opacity 0.55s ease ${delay}ms,transform 0.55s ease ${delay}ms`,...style}}>
      {children}
    </div>
  );
}

function Tag({children,color,bg,border}){
  return<span style={{background:bg||C.orangeFaint,color:color||C.orangeL,border:`1px solid ${border||C.orangeBorder}`,
    fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>
    {children}
  </span>;
}

  {label:"Recovery Rate",value:"3.8 days",sub:"After a 60+ mile week",color:C.orangeL,icon:"🔄",

  {label:"Sub-8:00 capacity",metric:"consecutive miles",before:8,after:18,unit:"mi",color:C.blueL,

function CapabilityExpansion(){
  const ref=useRef(null);const inView=useInView(ref);
  const[hovered,setHovered]=useState(null);
  return(
    <div ref={ref}>
      <Label>Capability Expansion · 90 Days</Label>
      <p style={{color:C.t50,fontSize:13,lineHeight:1.6,marginBottom:20}}>
        What your body can do now that it couldn't do 90 days ago. Not predicted — measured.
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {capabilities.map((c,i)=>{
          const maxVal=Math.max(c.before,c.after)*1.15;
          const beforePct=(c.before/maxVal)*100;
          const afterPct=(c.after/maxVal)*100;
          const improvement=c.invert
            ?((c.before-c.after)/c.before*100).toFixed(0)
            :((c.after-c.before)/c.before*100).toFixed(0);
          const isHov=hovered===i;
          return(
            <div key={i} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
              style={{cursor:"default",opacity:inView?1:0,transform:inView?"none":"translateX(-16px)",

// ═══════════════════════════════════════════════════════════
// 4. RECOVERY FINGERPRINT (Canvas)
// ═══════════════════════════════════════════════════════════
function RecoveryFingerprint(){
  const canvasRef=useRef(null);
  const ref=useRef(null);const inView=useInView(ref);
  const[tooltip,setTooltip]=useState(null);
  const drawn=useRef(false);

  const before=[100,72,68,71,79,88,95,100];
  const after= [100,74,80,88,94,98,100,100];
  const days=["Day 0","Day 1","Day 2","Day 3","Day 4","Day 5","Day 6","Day 7"];

  useEffect(()=>{
    if(!inView||drawn.current||!canvasRef.current)return;
    drawn.current=true;
    const canvas=canvasRef.current;
    const dpr=window.devicePixelRatio||1;
    canvas.width=700*dpr;canvas.height=160*dpr;
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const W=700,H=160;
    const pad={t:16,r:20,b:32,l:44};
    const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
    const n=before.length;
    const xScale=i=>(i/(n-1))*iw+pad.l;
    const yScale=v=>pad.t+ih-(((v-60)/45)*ih);

    const drawGrid=()=>{
      ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;
      [70,80,90,100].forEach(v=>{
        ctx.beginPath();ctx.moveTo(pad.l,yScale(v));ctx.lineTo(pad.l+iw,yScale(v));ctx.stroke();
        ctx.fillStyle=C.t20;ctx.font="9px system-ui";ctx.textAlign="right";
        ctx.fillText(v+"%",pad.l-6,yScale(v)+3);
      });
      ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.setLineDash([3,4]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad.l,yScale(100));ctx.lineTo(pad.l+iw,yScale(100));ctx.stroke();
      ctx.setLineDash([]);
      days.forEach((d,i)=>{
        ctx.fillStyle=C.t20;ctx.font="9px system-ui";ctx.textAlign="center";
        ctx.fillText(d,xScale(i),H-8);
      });
    };

    const bPts=before.map((v,i)=>({x:xScale(i),y:yScale(v)}));
    const aPts=after.map((v,i)=>({x:xScale(i),y:yScale(v)}));
    const totalLen=aPts.reduce((acc,pt,i)=>{
      if(i===0)return 0;
      return acc+Math.hypot(pt.x-aPts[i-1].x,pt.y-aPts[i-1].y);
    },0);
    let p=0;

    const tick=()=>{
      ctx.clearRect(0,0,W,H);
      drawGrid();

      // Before fill
      ctx.beginPath();ctx.moveTo(bPts[0].x,H-pad.b);
      bPts.forEach(pt=>ctx.lineTo(pt.x,pt.y));
      ctx.lineTo(bPts[bPts.length-1].x,H-pad.b);ctx.closePath();
      ctx.fillStyle="rgba(255,255,255,0.03)";ctx.fill();

      // Before line
      ctx.beginPath();ctx.moveTo(bPts[0].x,bPts[0].y);
      for(let i=1;i<bPts.length-1;i++){
        const mx=(bPts[i].x+bPts[i+1].x)/2,my=(bPts[i].y+bPts[i+1].y)/2;
        ctx.quadraticCurveTo(bPts[i].x,bPts[i].y,mx,my);
      }
      ctx.lineTo(bPts[bPts.length-1].x,bPts[bPts.length-1].y);
      ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);

      // After - animated
      const fillProg=Math.min(p/totalLen,1);
      const visA=Math.floor(fillProg*(n-1));
      const frac=fillProg*(n-1)-visA;
      const visApts=[];
      for(let i=0;i<=visA&&i<n;i++) visApts.push(aPts[i]);
      if(visA<n-1){
        visApts.push({
          x:aPts[visA].x+(aPts[visA+1].x-aPts[visA].x)*frac,
          y:aPts[visA].y+(aPts[visA+1].y-aPts[visA].y)*frac
        });
      }

      if(visApts.length>1){
        const grad=ctx.createLinearGradient(0,yScale(100),0,H-pad.b);
        grad.addColorStop(0,"rgba(42,184,122,0.15)");grad.addColorStop(1,"rgba(42,184,122,0.02)");
        ctx.beginPath();ctx.moveTo(visApts[0].x,H-pad.b);
        visApts.forEach(pt=>ctx.lineTo(pt.x,pt.y));
        ctx.lineTo(visApts[visApts.length-1].x,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();

        const lg=ctx.createLinearGradient(visApts[0].x,0,visApts[visApts.length-1].x,0);
        lg.addColorStop(0,C.tsb+"88");lg.addColorStop(1,C.tsb);
        ctx.beginPath();ctx.moveTo(visApts[0].x,visApts[0].y);
        for(let i=1;i<visApts.length-1;i++){
          const mx=(visApts[i].x+visApts[i+1].x)/2,my=(visApts[i].y+visApts[i+1].y)/2;
          ctx.quadraticCurveTo(visApts[i].x,visApts[i].y,mx,my);
        }
        ctx.lineTo(visApts[visApts.length-1].x,visApts[visApts.length-1].y);
        ctx.strokeStyle=lg;ctx.lineWidth=2.5;ctx.stroke();

        const last=visApts[visApts.length-1];
        const glow=ctx.createRadialGradient(last.x,last.y,0,last.x,last.y,8);
        glow.addColorStop(0,"rgba(42,184,122,0.6)");glow.addColorStop(1,"rgba(42,184,122,0)");
        ctx.beginPath();ctx.arc(last.x,last.y,8,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();
        ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2);ctx.fillStyle=C.tsb;ctx.fill();
      }

      if(p<totalLen){p=Math.min(p+6,totalLen);requestAnimationFrame(tick);}
      else{
        bPts.forEach((pt)=>{
          ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
          ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fill();
        });
      }
    };
    setTimeout(()=>requestAnimationFrame(tick),200);
  },[inView]);

  const recoveryNotes=["Race complete. Baseline.",
    "Fatigue peak. Easy miles only.",
    "Now: bouncing back. Before: still flat.",
    "Now: 88% — almost training-ready. Before: still rebuilding.",
    "Now: fully absorbed. Before: just clearing.",
    "Now: full capacity. Before: approaching baseline.",
    "Full training resumes.","Full training resumes."];

  const handleMove=useCallback((e)=>{

          <div style={{position:"absolute",top:10,left:Math.min(tooltip.x-60,260),

const corrNodes=[
  {id:"sleep",  label:"Sleep",     group:"input", color:C.blue},
  {id:"motiv",  label:"Motivation",group:"input", color:C.blue},
  {id:"stress", label:"Stress",    group:"input", color:C.blue},

  {id:"compl",  label:"Completion",group:"output",color:C.tsb},
];
const corrLinks=[
  {source:"motiv", target:"eff",   r:0.71, lag:"2-3 days",confirmed:9, note:"Your strongest signal. High motivation → efficiency gain within 2-3 days. Confirmed 9 times."},
  {source:"sleep", target:"eff",   r:0.62, lag:"1-2 days",confirmed:7, note:"Every hour of sleep above your baseline produces a measurable efficiency boost within 48 hours."},
  {source:"tsb",   target:"pace",  r:0.68, lag:"0-1 days",confirmed:6, note:"TSB directly predicts your pace at a given HR. Fresh form = faster pace at the same effort."},
  {source:"hrv",   target:"eff",   r:0.44, lag:"1 day",  confirmed:4, note:"Higher overnight HRV → better economy the next day. Still building confidence."},
  {source:"stress", target:"compl",r:-0.55,lag:"0-1 days",confirmed:5, note:"High stress days correlate with skipped or shortened workouts. Inverse relationship."},
  {source:"sleep", target:"pace",  r:0.48, lag:"2 days",  confirmed:4, note:"Sleep quality feeds into pace capacity with a 2-day lag."},
  {source:"motiv", target:"compl", r:0.58, lag:"0 days",  confirmed:6, note:"Motivation on the day predicts workout completion. Your self-report is a reliable leading indicator."},
  {source:"hrv",   target:"pace",  r:0.38, lag:"1 day",   confirmed:3, note:"Emerging pattern. HRV appears to predict next-day pace capacity. 3 confirmations."},
];

function CorrelationWeb(){
  const svgRef=useRef(null);
  const containerRef=useRef(null);
  const ref=useRef(null);const inView=useInView(ref);
  const[active,setActive]=useState(null);
  const[positions,setPositions]=useState({});

  useEffect(()=>{
    if(!inView||!containerRef.current)return;
    const W=containerRef.current.clientWidth||500,H=200;
    const nodes=corrNodes.map(n=>({...n}));
    const links=corrLinks.map(l=>({...l}));
    const inputs=nodes.filter(n=>n.group==="input");
    const outputs=nodes.filter(n=>n.group==="output");
    inputs.forEach((n,i)=>{n.x=W*0.22;n.y=H*0.12+i*(H*0.8/Math.max(inputs.length-1,1));});
    outputs.forEach((n,i)=>{n.x=W*0.78;n.y=H*0.2+i*(H*0.7/Math.max(outputs.length-1,1));});

    const sim=d3.forceSimulation(nodes)
      .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>Math.max(120,160*(1-Math.abs(d.r)))))
      .force("charge",d3.forceManyBody().strength(-80))
      .force("x",d3.forceX(d=>d.group==="input"?W*0.22:W*0.78).strength(0.6))
      .force("y",d3.forceY(H/2).strength(0.1))
      .force("collision",d3.forceCollide(28))
      .alphaDecay(0.05);

    sim.on("tick",()=>{
      const pos={};
      nodes.forEach(n=>pos[n.id]={x:Math.max(40,Math.min(W-40,n.x)),y:Math.max(20,Math.min(H-20,n.y))});
      setPositions({...pos});
    });
    return()=>sim.stop();
  },[inView]);

  const activeLink=active?corrLinks.find(l=>(typeof l.source==='object'?l.source.id:l.source)===active.source&&(typeof l.target==='object'?l.target.id:l.target)===active.target):null;

  return(
    <div ref={ref}>
      <Label>Correlation Web</Label>
      <p style={{color:C.t50,fontSize:13,lineHeight:1.6,marginBottom:14}}>
        What drives your performance. Edge thickness = correlation strength. Hover any connection.
      </p>
      <div ref={containerRef} style={{position:"relative"}}>
        <svg style={{width:"100%",height:200,display:"block",overflow:"visible"}}>
          {Object.keys(positions).length>0&&(
            <>
              {corrLinks.map((l,i)=>{
                const sid=typeof l.source==='object'?l.source.id:l.source;
                const tid=typeof l.target==='object'?l.target.id:l.target;
                const s=positions[sid],t=positions[tid];
                if(!s||!t)return null;
                const isActive=active&&active.source===sid&&active.target===tid;
                const neg=l.r<0;
                const str=Math.abs(l.r);
                const mx=(s.x+t.x)/2,my=(s.y+t.y)/2-20;
                return(
                  <g key={i} onMouseEnter={()=>setActive({source:sid,target:tid})} onMouseLeave={()=>setActive(null)}
                    style={{cursor:"pointer"}}>
                    <path d={`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`} fill="none"
                      stroke={isActive?(neg?C.red:C.tsb):"rgba(255,255,255,0.08)"}
                      strokeWidth={isActive?str*8+2:str*5+1}
                      strokeDasharray={neg?"6,4":"none"}
                      style={{transition:"all 0.2s ease"}}/>
                    <path d={`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`} fill="none"
                      stroke="transparent" strokeWidth={16}/>
                  </g>
                );
              })}
              {corrNodes.map(n=>{
                const p=positions[n.id];if(!p)return null;
                const isInput=n.group==="input";
                const isRelated=active&&corrLinks.some(l=>{
                  const sid=typeof l.source==='object'?l.source.id:l.source;
                  const tid=typeof l.target==='object'?l.target.id:l.target;
                  return sid===active.source&&tid===active.target&&(sid===n.id||tid===n.id);
                });
                return(
                  <g key={n.id} transform={`translate(${p.x},${p.y})`}>
                    <circle r={22} fill={isRelated?C.hover:C.cardDeep} stroke={isRelated?(isInput?C.blue:C.tsb):C.borderMed} strokeWidth={1.5}
                      style={{transition:"all 0.2s ease"}}/>
                    <text textAnchor="middle" dominantBaseline="middle" fill={isRelated?(isInput?C.blueL:C.tsb):C.t70}
                      fontSize={9} fontWeight={isRelated?700:400}
                      style={{transition:"fill 0.2s ease",userSelect:"none"}}>
                      {n.label.split(" ").map((w,wi)=>(
                        <tspan key={wi} x={0} dy={wi===0&&n.label.includes(" ")?-5:wi>0?11:0}>{w}</tspan>
                      ))}
                    </text>
                  </g>
                );
              })}
              <text x="11%" y={14} textAnchor="middle" fill={C.t20} fontSize={9}>INPUTS</text>
              <text x="89%" y={14} textAnchor="middle" fill={C.t20} fontSize={9}>OUTPUTS</text>
            </>
          )}
        </svg>
        {active&&(()=>{
          const al=corrLinks.find(l=>{
            const sid=typeof l.source==='object'?l.source.id:l.source;
            const tid=typeof l.target==='object'?l.target.id:l.target;
            return sid===active.source&&tid===active.target;
          });
          if(!al)return null;
          const sid=typeof al.source==='object'?al.source.id:al.source;
          const tid=typeof al.target==='object'?al.target.id:al.target;
          return(
            <div style={{marginTop:12,background:C.hover,border:`1px solid ${C.borderMed}`,
              borderRadius:10,padding:"14px 18px",animation:"fadeIn 0.2s ease"}}>
              <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:600,color:al.r<0?C.red:C.tsb}}>
                  {corrNodes.find(n=>n.id===sid)?.label} → {corrNodes.find(n=>n.id===tid)?.label}
                </span>
                <div style={{display:"flex",gap:8}}>
                  <Tag color={al.r<0?C.red:C.tsb} bg={al.r<0?C.redFaint:C.tsbFaint} border={al.r<0?"rgba(224,80,80,0.3)":C.tsbBorder}>
                    r = {al.r>0?"+":""}{al.r}
                  </Tag>
                  <Tag color={C.t50} bg={C.t06} border={C.border}>lag {al.lag}</Tag>
                  <Tag color={C.t50} bg={C.t06} border={C.border}>confirmed {al.confirmed}×</Tag>
                </div>
              </div>
              <p style={{fontSize:13,color:C.t70,lineHeight:1.65,margin:0}}>{al.note}</p>
            </div>
          );
        })()}
      </div>
      <div style={{display:"flex",gap:16,marginTop:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:20,height:3,background:C.tsb,borderRadius:1}}/>
          <span style={{fontSize:11,color:C.t35}}>Positive correlation</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:20,height:2,background:C.red,borderRadius:1,borderTop:`1px dashed ${C.red}`}}/>
          <span style={{fontSize:11,color:C.t35}}>Inverse correlation</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:20,height:1,background:C.t35}}/>
          <span style={{fontSize:11,color:C.t35}}>Thicker = stronger</span>
        </div>
      </div>
    </div>
  );
}

function PredictionSpace(){
  const ref=useRef(null);const inView=useInView(ref);
  const[sleep,setSleep]=useState(6.1);
  const[motiv,setMotiv]=useState(4);
  const[tsb,setTsb]=useState(-4.7);

  const baseline=3*60+56;
  const sleepDelta=(sleep-6.1)*(-45);
  const motivDelta=(4-motiv)*30;
  const tsbDelta=(tsb+4.7)*(-15);

  const totalSecs=Math.max(60*60*2+30*60, baseline*60+sleepDelta+motivDelta+tsbDelta);
  const hrs=Math.floor(totalSecs/3600);
  const mins=Math.floor((totalSecs%3600)/60);
  const secs=Math.floor(totalSecs%60);
  const timeStr=`${hrs}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;

  const delta=Math.round((baseline*60-totalSecs)/60);
  const isImproved=delta>0;
  const zone=tsb>=-5&&tsb<=8?"Optimal window":(tsb<-5?"Below optimal — fatigued":"Above optimal — too flat");
  const zoneColor=tsb>=-5&&tsb<=8?C.tsb:(tsb<-5?C.atl:C.t50);

              onChange={e=>setMotiv(parseInt(e.target.value))} className="sl-motiv"/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>

                        <p style={{fontSize:13,color:C.t70,lineHeight:1.65,margin:0}}>{f.evidence}</p>
                      </div>
                      <div>
                        <div style={{fontSize:9,color:f.color,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:5}}>What It Means Now</div>
                        <p style={{fontSize:13,color:C.t70,lineHeight:1.65,margin:0}}>{f.implication}</p>
                      </div>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <span style={{fontSize:9,color:C.t35,marginRight:4}}>Confirmations:</span>
                        {Array.from({length:f.confirmed}).map((_,ci)=>(
                          <div key={ci} style={{width:8,height:8,borderRadius:"50%",background:f.color,opacity:0.8}}/>
                        ))}
                        {isConfirmed&&Array.from({length:Math.max(0,9-f.confirmed)}).map((_,ci)=>(
                          <div key={`e${ci}`} style={{width:8,height:8,borderRadius:"50%",background:C.t10}}/>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
