function useInView(ref, thresh=0.1){
  const[v,setV]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:thresh});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return v;
}
function useCountUp(target,ms=900,delay=0){
  const[v,setV]=useState(0);
  useEffect(()=>{
    const t=setTimeout(()=>{
      const t0=Date.now(),tick=()=>{
        const p=Math.min((Date.now()-t0)/ms,1),e=1-Math.pow(1-p,3);
        setV(+(e*target).toFixed(1));
        if(p<1)requestAnimationFrame(tick);
      };requestAnimationFrame(tick);
    },delay);
    return()=>clearTimeout(t);
  },[target,delay]);
  return v;
}

function CorrelationWeb(){
  const svgRef=useRef(null);
  const wrapRef=useRef(null);
  const inView=useInView(wrapRef);
  const[pos,setPos]=useState({});
  const[active,setActive]=useState(null);
  const[dims,setDims]=useState({w:800,h:260});

  useEffect(()=>{
    const ro=new ResizeObserver(([e])=>setDims({w:e.contentRect.width,h:260}));
    if(wrapRef.current)ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[]);

  useEffect(()=>{
    if(!inView)return;
    const{w,h}=dims;
    const nodes=NODES.map(n=>({...n}));
    const links=EDGES.map(e=>({...e,source:e.s,target:e.t}));
    nodes.filter(n=>n.group==="in").forEach((n,i,arr)=>{
      n.x=w*0.18; n.y=h*0.08+i*(h*0.85/Math.max(arr.length-1,1));
    });
    nodes.filter(n=>n.group==="out").forEach((n,i,arr)=>{
      n.x=w*0.82; n.y=h*0.15+i*(h*0.7/Math.max(arr.length-1,1));
    });
    const sim=d3.forceSimulation(nodes)
      .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>130+80*(1-Math.abs(d.r))))
      .force("charge",d3.forceManyBody().strength(-60))
      .force("x",d3.forceX(d=>d.group==="in"?w*0.18:w*0.82).strength(0.7))
      .force("y",d3.forceY(h/2).strength(0.08))
      .force("col",d3.forceCollide(32))
      .alphaDecay(0.04);
    sim.on("tick",()=>{
      const p={};
      nodes.forEach(n=>{p[n.id]={x:Math.max(36,Math.min(w-36,n.x)),y:Math.max(18,Math.min(h-18,n.y))};});
      setPos({...p});
    });
    return()=>sim.stop();
  },[inView,dims]);

  return(
    <div ref={wrapRef}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
        <Lbl>What Drives Your Performance</Lbl>
        <LiveDot live={true}/>
      </div>
      <p style={{color:C.t60,fontSize:14,lineHeight:1.7,maxWidth:600,marginBottom:18}}>
        Every connection here is statistically confirmed from your own data. Edge thickness is correlation strength. Dashed edges are inverse. Hover any connection for the evidence behind it.
      </p>
      <div style={{display:"flex",gap:16,marginBottom:14,flexWrap:"wrap"}}>
        {[
          {c:C.green,l:"Positive (more → better)",dash:false},
          {c:C.red,l:"Inverse (more → worse)",dash:true},
          {c:C.t25,l:"Stronger = thicker",dash:false},
        ].map(d=>(
          <div key={d.l} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:22,height:d.dash?0:2,background:d.c,borderRadius:1,
              borderTop:d.dash?`2px dashed ${d.c}`:"none"}}/>
            <span style={{fontSize:10,color:C.t40}}>{d.l}</span>
          </div>
        ))}
      </div>
      <svg ref={svgRef} style={{width:"100%",height:dims.h,display:"block",overflow:"visible"}}
        viewBox={`0 0 ${dims.w} ${dims.h}`}>
        <text x={dims.w*0.18} y={10} textAnchor="middle" fill={C.t25} fontSize={9} fontWeight={600}>INPUTS</text>
        <text x={dims.w*0.82} y={10} textAnchor="middle" fill={C.t25} fontSize={9} fontWeight={600}>OUTPUTS</text>
        {Object.keys(pos).length>0&&(<>
          {EDGES.map((e,i)=>{
            const sid=typeof e.source==='object'?e.source.id:e.s;
            const tid=typeof e.target==='object'?e.target.id:e.t;
            const s=pos[sid],t=pos[tid];if(!s||!t)return null;
            const isAct=active?.s===e.s&&active?.t===e.t;
            const isDim=active&&!isAct;
            const str=Math.abs(e.r);const neg=e.dir===-1;
            const color=isAct?(neg?C.red:C.green):isDim?"rgba(255,255,255,0.05)":(neg?"rgba(224,85,85,0.35)":"rgba(42,184,122,0.3)");
            const sw=isAct?str*10+3:str*6+1;
            const mx=(s.x+t.x)/2,my=(s.y+t.y)/2-30;
            return(
              <g key={i} style={{cursor:"pointer"}}
                onMouseEnter={()=>setActive({s:e.s,t:e.t})}
                onMouseLeave={()=>setActive(null)}>
                <path d={`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`}
                  fill="none" stroke={color} strokeWidth={sw}
                  strokeDasharray={neg?"7,4":"none"} strokeLinecap="round"
                  style={{transition:"all 0.18s ease"}}/>
                <path d={`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`}
                  fill="none" stroke="transparent" strokeWidth={20}/>
              </g>
            );
          })}
          {NODES.map(n=>{
            const p=pos[n.id];if(!p)return null;
            const isIn=n.group==="in";
            const rel=active&&EDGES.some(e=>e.s===active.s&&e.t===active.t&&(e.s===n.id||e.t===n.id));
            const nodeColor=isIn?C.blue:C.green;
            return(
              <g key={n.id} transform={`translate(${p.x},${p.y})`}>
                <circle r={26} fill={rel?C.hover:C.deep}
                  stroke={rel?nodeColor:C.bMed} strokeWidth={rel?2:1}
                  style={{transition:"all 0.18s ease"}}/>
                <text textAnchor="middle" dominantBaseline="middle"
                  fill={rel?nodeColor:C.t60} fontSize={9} fontWeight={rel?700:400}
                  style={{userSelect:"none",transition:"fill 0.18s ease",pointerEvents:"none"}}>
                  {n.label.split(" ").map((w,wi,arr)=>(
                    <tspan key={wi} x={0} dy={wi===0?(arr.length>1?-5:0):11}>{w}</tspan>
                  ))}
                </text>
                {rel&&<circle r={28} fill="none" stroke={nodeColor} strokeWidth={1} opacity={0.3}/>}
              </g>
            );
          })}
        </>)}
      </svg>
      <div style={{minHeight:80,marginTop:4}}>
        {active?(()=>{
          const ae=EDGES.find(e=>e.s===active.s&&e.t===active.t);
          if(!ae)return null;
          return(
            <div style={{background:C.hover,border:`1px solid ${ae.dir===-1?C.rBorder:C.gBorder}`,
              borderRadius:12,padding:"16px 20px",animation:"fadeUp 0.15s ease"}}>
              <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:700,color:ae.dir===-1?C.red:C.green}}>
                  {NODES.find(n=>n.id===ae.s)?.label} → {NODES.find(n=>n.id===ae.t)?.label}
                </span>
                <Tag color={ae.dir===-1?C.red:C.green} bg={ae.dir===-1?C.rFaint:C.gFaint} border={ae.dir===-1?C.rBorder:C.gBorder}>
                  r = {ae.r>0?"+":""}{ae.r}
                </Tag>
                <Tag color={C.t60} bg={C.t08} border={C.border}>lag {ae.lag}</Tag>
                <Tag color={C.t60} bg={C.t08} border={C.border}>confirmed {ae.n}×</Tag>
              </div>
              <p style={{fontSize:13,color:C.t60,lineHeight:1.7,margin:0}}>{ae.note}</p>
            </div>
          );
        })():(
          <div style={{height:64,display:"flex",alignItems:"center",justifyContent:"center",
            border:`1px dashed ${C.border}`,borderRadius:12}}>
            <span style={{fontSize:12,color:C.t25}}>Hover any connection to see the evidence</span>
          </div>
        )}
      </div>
    </div>
  );
}

function CapabilityExpansion(){
  const ref=useRef(null);const inView=useInView(ref);

function PredictionSpace(){
  const ref=useRef(null);const inView=useInView(ref);
  const[sleep,setSleep]=useState(6.1);
  const[motiv,setMotiv]=useState(4);
  const[tsb,setTsb]=useState(-4.7);
  const baseSec=3*3600+56;
  const sleepEffect=(sleep-6.1)*-42;
  const motivEffect=(4-motiv)*-28;
  const tsbEffect=(tsb-(-4.7))*-12;
  const totalSec=Math.max(2*3600+30*60, baseSec+sleepEffect+motivEffect+tsbEffect);
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60),s=Math.floor(totalSec%60);
  const timeStr=`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const diffMin=Math.round((baseSec-totalSec)/60);
  const inWindow=tsb>=-5&&tsb<=8;
  return(
    <div ref={ref} style={{opacity:inView?1:0,transform:inView?"none":"translateY(18px)",transition:"all 0.5s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
        <Lbl>Race Day Prediction Space</Lbl>
        <LiveDot live={false}/>
        <span style={{fontSize:10,color:C.oL}}>— scenario API needed to wire to backend</span>
      </div>
      <p style={{color:C.t60,fontSize:14,lineHeight:1.7,maxWidth:560,marginBottom:20}}>
        Move the sliders. The projection responds using your own correlation coefficients as weights — not a generic model. Needs a <code style={{fontSize:11,color:C.oL,background:C.oFaint,padding:"1px 5px",borderRadius:4}}>/v1/predictions/scenario</code> endpoint to connect to live data.
      </p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        <div>
          {[
            {label:"Avg sleep",unit:"h/night",min:4,max:9,step:0.1,val:sleep,set:setSleep,
             color:C.blue,cls:"rs rs-b",sub:`Your current avg: ${sleep.toFixed(1)}h · correlation r=0.62`},
            {label:"Motivation level",unit:"/5",min:1,max:5,step:1,val:motiv,set:setMotiv,
             color:C.oL,cls:"rs rs-o",sub:`Current avg: ${motiv}/5 · correlation r=0.71`},
            {label:"Race day TSB",unit:"",min:-15,max:15,step:0.5,val:tsb,set:setTsb,
             color:inWindow?C.green:C.atl,cls:"rs rs-g",
             sub:inWindow?"In your optimal window (−5 to +8)":"Outside optimal window — adjust taper"},
          ].map((sl,i)=>(
            <div key={i} style={{marginBottom:i<2?20:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:C.t80}}>{sl.label}</span>
                <span style={{fontSize:18,fontWeight:800,color:sl.color}}>{sl.val}{sl.unit}</span>
              </div>
              <input type="range" min={sl.min} max={sl.max} step={sl.step} value={sl.val}
                onChange={e=>sl.set(parseFloat(e.target.value))} className={sl.cls}/>
              <div style={{fontSize:10,color:sl.color,marginTop:4,opacity:0.8}}>{sl.sub}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",
          background:C.deep,borderRadius:14,padding:"24px",
          border:`1px solid ${diffMin>0?C.gBorder:C.oBorder}`}}>
          <Lbl c={C.t25}>Projected Finish Time</Lbl>
          <div style={{fontSize:54,fontWeight:800,letterSpacing:"-2px",color:diffMin>0?C.green:C.atl,
            lineHeight:1,marginBottom:8,transition:"color 0.3s ease"}}>
            {timeStr}
          </div>
          {diffMin!==0&&(
            <div style={{fontSize:13,fontWeight:600,marginBottom:16,color:diffMin>0?C.green:C.atl}}>
              {diffMin>0?`${diffMin} min faster`:`${Math.abs(diffMin)} min slower`} than baseline
            </div>
          )}
          <div style={{fontSize:12,color:C.t25,textAlign:"center",lineHeight:1.65,marginBottom:14}}>
            Baseline 3:00:56 at current trajectory.<br/>
            Weights derived from your confirmed correlations.
          </div>
          <div style={{padding:"8px 14px",borderRadius:8,background:C.oFaint,border:`1px solid ${C.oBorder}`,
            fontSize:11,color:C.oL,textAlign:"center"}}>
            Needs <code style={{background:C.oFaint}}>POST /v1/predictions/scenario</code> to go live
          </div>
        </div>
      </div>
    </div>
  );
}
