services:
  caddy:
    image: caddy:2
    container_name: strideiq_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: strideiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-running_app}
    volumes:
      - runningapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: strideiq_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: strideiq_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-strideiq-minio-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    expose:
      - "9000"   # S3 API (internal only — boto3 via Docker network)
      - "9001"   # Admin console (internal only — never exposed via Caddy)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: strideiq_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./.uploads:/uploads
      - ./books:/books
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    command: sh -c "python run_migrations.py && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: strideiq_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./.uploads:/uploads
      - ./books:/books
    command: celery -A tasks worker --loglevel=info --pool=prefork --concurrency=4 --max-tasks-per-child=200 -Q briefing_high,briefing
    stop_signal: SIGTERM
    stop_grace_period: 30s

  worker_default:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: strideiq_worker_default
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./.uploads:/uploads
      - ./books:/books
    command: celery -A tasks worker --loglevel=info --pool=prefork --concurrency=6 --max-tasks-per-child=200 -Q default
    stop_signal: SIGTERM
    stop_grace_period: 30s

  beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: strideiq_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A tasks beat --loglevel=info
    stop_signal: SIGTERM
    stop_grace_period: 10s

  web:
    build:
      context: ./apps/web
      args:
        - NEXT_PUBLIC_API_URL=https://strideiq.run
        - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: strideiq_web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    expose:
      - "3000"
    command: npm start

volumes:
  # Named volumes (NOT external) so you never hit "external volume not found"
  runningapp_postgres_data:
    name: runningapp_postgres_data
  redis_data:
    name: strideiq_redis_data
  caddy_data:
    name: strideiq_caddy_data
  caddy_config:
    name: strideiq_caddy_config
  minio_data:
    name: strideiq_minio_data

